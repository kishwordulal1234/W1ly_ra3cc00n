    <text x="70" y="545">__W1ly_ra3cc00n__ __W1ly_ra3cc00n__ __W1ly_ra3cc00n__ __W1ly_ra3cc00n__</text>
    <text x="15" y="570">__W1ly_ra3cc00n__ __W1ly_ra3cc00n__ __W1ly_ra3cc00n__ __W1ly_ra3cc00n__</text>
    <text x="45" y="595">__W1ly_ra3cc00n__ __W1ly_ra3cc00n__ __W1ly_ra3cc00n__ __W1ly_ra3cc00n__</text>
