<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0000"/>
      <stop offset="30%" style="stop-color:#150005"/>
      <stop offset="60%" style="stop-color:#0a0010"/>
      <stop offset="100%" style="stop-color:#050005"/>
    </linearGradient>

    <linearGradient id="bloodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="40%" style="stop-color:#cc0000"/>
      <stop offset="100%" style="stop-color:#4a0000"/>
    </linearGradient>

    <linearGradient id="bloodGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#550000;stop-opacity:0.9"/>
    </linearGradient>

    <radialGradient id="glowRed" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#880000;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="evilEyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="40%" style="stop-color:#cc0000"/>
      <stop offset="80%" style="stop-color:#880000"/>
      <stop offset="100%" style="stop-color:#440000"/>
    </radialGradient>

    <linearGradient id="scarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#990000"/>
      <stop offset="50%" style="stop-color:#cc2222"/>
      <stop offset="100%" style="stop-color:#660000"/>
    </linearGradient>

    <linearGradient id="furGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555555"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>

    <linearGradient id="maskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>

    <linearGradient id="textBlood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2222"/>
      <stop offset="50%" style="stop-color:#cc0000"/>
      <stop offset="100%" style="stop-color:#880000"/>
    </linearGradient>

    <linearGradient id="leetTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#aa0000;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#550000;stop-opacity:0.4"/>
    </linearGradient>

    <filter id="neonRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ultraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bloodDripShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="fog">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="alphaFog">
        <feFuncA type="linear" slope="0.15" intercept="0"/>
      </feComponentTransfer>
      <feFlood flood-color="#330000" result="color"/>
      <feComposite in="color" in2="alphaFog" operator="in"/>
    </filter>
  </defs>

